<aside class="sidebar">
    <div class="sidebar-header">
        <h2>Cuidar+</h2>
    </div>
    <nav class="sidebar-nav">
        <a href="{{ url_for('main.home') }}" class="nav-item {% if request_path == url_for('main.home') or request_path == '/dashboard' %}active{% endif %}">
            <span>📊</span> Painel de Controle
        </a>
        <a href="{{ url_for('auth.profile') }}" class="nav-item {% if request_path.startswith(url_for('auth.profile')) %}active{% endif %}">
            <span>👤</span> Meu Perfil
        </a>
        <a href="{% if current_user_role == 'admin' %}{{ url_for('clock.clock_entries') }}{% else %}{{ url_for('clock.my_clock_entries') }}{% endif %}" class="nav-item {% if request_path.startswith('/clock') %}active{% endif %}">
            <span>🕐</span> Registros de Ponto
        </a>
        <a href="{{ url_for('announcements.announcements') }}" class="nav-item {% if request_path.startswith(url_for('announcements.announcements')) %}active{% endif %}">
            <span>📣</span> Avisos
        </a>
        <a href="{{ url_for('events.events') }}" class="nav-item {% if request_path.startswith(url_for('events.events')) %}active{% endif %}">
            <span>🎫</span> Eventos
        </a>
        <a href="{{ url_for('activities.activities') }}" class="nav-item {% if request_path.startswith(url_for('activities.activities')) %}active{% endif %}">
            <span>📝</span> Atividades
        </a>
        {% if is_admin %}
        <a href="{{ url_for('users.users') }}" class="nav-item {% if request_path.startswith(url_for('users.users')) %}active{% endif %}">
            <span>👥</span> Voluntários
        </a>
        <a href="{{ url_for('intents.intents') }}" class="nav-item {% if request_path.startswith(url_for('intents.intents')) %}active{% endif %}">
            <span>🧾</span> Candidatos
        </a>
        <a href="{{ url_for('reports.reports_index') }}" class="nav-item {% if request_path.startswith(url_for('reports.reports_index')) %}active{% endif %}">
            <span>📁</span> Relatórios
        </a>
        {% endif %}
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <strong>{{ current_user_name or user_name }}</strong>
        </div>
        <div class="footer-actions">
            <button class="theme-toggle" aria-label="Alternar tema">
                <span class="dot" aria-hidden="true"></span>
            </button>
            <a href="{{ url_for('auth.logout') }}" class="btn-logout">Sair</a>
        </div>
    </div>
</aside>
