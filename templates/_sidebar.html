<aside class="sidebar">
    <div class="sidebar-header">
        <h2>Cuidar+</h2>
    </div>
    <nav class="sidebar-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-item {% if request_path.startswith(url_for('dashboard')) %}active{% endif %}">
            <span>📊</span> Painel de Controle
        </a>
        <a href="{{ url_for('profile') }}" class="nav-item {% if request_path.startswith(url_for('profile')) %}active{% endif %}">
            <span>👤</span> Meu Perfil
        </a>
        <a href="{% if current_user_role == 'admin' %}{{ url_for('clock_entries') }}{% else %}{{ url_for('my_clock_entries') }}{% endif %}" class="nav-item {% if request_path.startswith(url_for('clock_entries')) or request_path.startswith(url_for('my_clock_entries')) %}active{% endif %}">
            <span>🕐</span> Registros de Ponto
        </a>
        <a href="{{ url_for('announcements') }}" class="nav-item {% if request_path.startswith(url_for('announcements')) %}active{% endif %}">
            <span>📣</span> Avisos
        </a>
        <a href="{{ url_for('events') }}" class="nav-item {% if request_path.startswith(url_for('events')) %}active{% endif %}">
            <span>🎫</span> Eventos
        </a>
        <a href="{{ url_for('activities') }}" class="nav-item {% if request_path.startswith(url_for('activities')) %}active{% endif %}">
            <span>📝</span> Atividades
        </a>
        {% if is_admin %}
        <a href="{{ url_for('users') }}" class="nav-item {% if request_path.startswith(url_for('users')) %}active{% endif %}">
            <span>👥</span> Voluntários
        </a>
        <a href="{{ url_for('intents') }}" class="nav-item {% if request_path.startswith(url_for('intents')) %}active{% endif %}">
            <span>🧾</span> Candidatos
        </a>
        <a href="{{ url_for('reports_index') }}" class="nav-item {% if request_path.startswith(url_for('reports_index')) %}active{% endif %}">
            <span>📁</span> Relatórios
        </a>
        {% endif %}
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <strong>{{ current_user_name or user_name }}</strong>
        </div>
        <div class="footer-actions">
            <button class="theme-toggle" aria-label="Alternar tema">
                <span class="dot" aria-hidden="true"></span>
            </button>
            <a href="{{ url_for('logout') }}" class="btn-logout">Sair</a>
        </div>
    </div>
</aside>
