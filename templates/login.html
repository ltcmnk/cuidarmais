{% extends "base.html" %}

{% block title %}Login - Cuidar+{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-theme-row">
            <button type="button" class="theme-toggle" aria-label="Alterar tema"><span class="dot">🌗</span></button>
        </div>

        <h1>Cuidar+</h1>
        <p class="subtitle">Sistema de Gestão de Voluntários do Hospital Cajuru</p>

        {% if error %}
        <div class="error-message" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" class="control" required autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" class="control" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary login-submit">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
