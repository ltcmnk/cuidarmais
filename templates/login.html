{% extends "base.html" %}

{% block title %}Login - Cuidar+{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div style="display:flex; justify-content:flex-end; margin-bottom:0.5rem;">
            <button type="button" class="theme-toggle" aria-label="Alterar tema"><span class="dot">🌗</span></button>
        </div>
        <h1>Cuidar+</h1>
        <p class="subtitle">Sistema de Gestão de Voluntários do Hospital Cajuru</p>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <div class="input-flag">Usuário</div>
                <label for="username" class="sr-only">Usuário</label>
                <input type="text" id="username" name="username" class="control" required autofocus>
            </div>
            
            <div class="form-group">
                <div class="input-flag">Senha</div>
                <label for="password" class="sr-only">Senha</label>
                <input type="password" id="password" name="password" class="control" required>
            </div>
            
            <button type="submit" class="btn-primary" style="display: block; margin: 0 auto;">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
